<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio em Foco | Ensino Médio</title>
    <style>
        /* CSS: Estilo Portal de Notícias */
        :root {
            --primary-color: #1a1a1a;
            --secondary-color: #d32f2f;
            --bg-color: #f9f9f9;
            --text-color: #333;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--secondary-color);
        }

        header h1 {
            font-family: 'Georgia', serif;
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            margin: 0.5rem 0 1.5rem 0;
            font-style: italic;
            color: #ccc;
        }

        .btn-nova {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.3s;
        }

        .btn-nova:hover { background-color: #b71c1c; }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Modal do Formulário */
        #form-section {
            background: white;
            padding: 2rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none; /* Escondido por padrão */
        }

        #form-section.active { display: block; }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }

        textarea { resize: vertical; min-height: 100px; }

        .form-actions { display: flex; gap: 1rem; }
        .btn-save { background-color: #2e7d32; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        .btn-cancel { background-color: #757575; color: white; border: none; padding: 10px 20px; cursor: pointer; }

        /* Grid de "Notícias" (Atividades) */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .news-card {
            background: white;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }

        .news-subject {
            color: var(--secondary-color);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .news-title {
            font-family: 'Georgia', serif;
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
            line-height: 1.2;
        }

        .news-desc {
            font-size: 1rem;
            line-height: 1.5;
            color: #555;
            flex-grow: 1;
            margin-bottom: 1.5rem;
        }

        .news-actions {
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        .btn-edit { background: none; border: 1px solid #1976d2; color: #1976d2; padding: 5px 10px; cursor: pointer; }
        .btn-delete { background: none; border: 1px solid #d32f2f; color: #d32f2f; padding: 5px 10px; cursor: pointer; }
        
        .empty-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>Portfólio em Foco</h1>
        <p>Acompanhe as últimas publicações e atividades do Ensino Médio</p>
        <button class="btn-nova" onclick="toggleForm()">+ Publicar Nova Atividade</button>
    </header>

    <main>
        <section id="form-section">
            <h2 id="form-title">Redigir Publicação</h2>
            <form id="portfolio-form">
                <input type="hidden" id="item-id">
                
                <label for="subject">Matéria / Caderno</label>
                <input type="text" id="subject" placeholder="Ex: Biologia, Matemática, História..." required>
                
                <label for="title">Manchete (Título da Atividade)</label>
                <input type="text" id="title" placeholder="Ex: Feira de Ciências: O ciclo da água" required>
                
                <label for="description">Corpo da Notícia (Descrição)</label>
                <textarea id="description" placeholder="Escreva sobre o que você aprendeu e como foi a atividade..." required></textarea>
                
                <div class="form-actions">
                    <button type="submit" class="btn-save">Publicar</button>
                    <button type="button" class="btn-cancel" onclick="toggleForm()">Cancelar</button>
                </div>
            </form>
        </section>

        <section id="news-grid">
            </section>
    </main>

    <script>
        // JAVASCRIPT: Lógica do CRUD e LocalStorage

        // 1. Inicialização
        const formSection = document.getElementById('form-section');
        const form = document.getElementById('portfolio-form');
        const newsGrid = document.getElementById('news-grid');
        
        // Carrega as atividades do LocalStorage (se não houver, cria um array vazio)
        let activities = JSON.parse(localStorage.getItem('portfolioActivities')) || [];

        // 2. READ: Função para renderizar as atividades na tela
        function renderActivities() {
            newsGrid.innerHTML = ''; // Limpa a grid antes de renderizar

            if (activities.length === 0) {
                newsGrid.innerHTML = '<div class="empty-msg">Nenhuma atividade publicada ainda. Seja o primeiro a escrever!</div>';
                return;
            }

            // Inverte o array para mostrar as mais recentes primeiro (estilo notícias)
            const reversedActivities = [...activities].reverse();

            reversedActivities.forEach(activity => {
                const card = document.createElement('article');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="news-subject">${activity.subject}</div>
                    <h3 class="news-title">${activity.title}</h3>
                    <div class="news-desc">${activity.description.replace(/\n/g, '<br>')}</div>
                    <div class="news-actions">
                        <button class="btn-edit" onclick="editActivity(${activity.id})">Editar</button>
                        <button class="btn-delete" onclick="deleteActivity(${activity.id})">Excluir</button>
                    </div>
                `;
                newsGrid.appendChild(card);
            });
        }

        // 3. CREATE & UPDATE: Salvar formulário
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que a página recarregue

            const id = document.getElementById('item-id').value;
            const subject = document.getElementById('subject').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;

            if (id) {
                // UPDATE: Se tem ID, estamos editando
                const index = activities.findIndex(act => act.id == id);
                activities[index] = { id: Number(id), subject, title, description };
            } else {
                // CREATE: Se não tem ID, é uma nova publicação
                const newActivity = {
                    id: Date.now(), // Usa o timestamp como ID único
                    subject,
                    title,
                    description
                };
                activities.push(newActivity);
            }

            saveData();
            toggleForm(false); // Esconde o form
            renderActivities();
        });

        // 4. UPDATE (Preencher form): Função para editar
        function editActivity(id) {
            const activity = activities.find(act => act.id === id);
            
            document.getElementById('item-id').value = activity.id;
            document.getElementById('subject').value = activity.subject;
            document.getElementById('title').value = activity.title;
            document.getElementById('description').value = activity.description;
            
            document.getElementById('form-title').innerText = 'Editar Publicação';
            toggleForm(true); // Mostra o formulário
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Rola para o topo
        }

        // 5. DELETE: Função para apagar
        function deleteActivity(id) {
            if (confirm('Tem certeza que deseja apagar esta publicação do seu portfólio?')) {
                activities = activities.filter(act => act.id !== id);
                saveData();
                renderActivities();
            }
        }

        // Função auxiliar para salvar no LocalStorage
        function saveData() {
            localStorage.setItem('portfolioActivities', JSON.stringify(activities));
        }

        // Função auxiliar para abrir/fechar o formulário
        function toggleForm(forceOpen = false) {
            if (forceOpen || formSection.style.display === 'none' || formSection.style.display === '') {
                formSection.classList.add('active');
            } else {
                formSection.classList.remove('active');
                form.reset(); // Limpa os campos
                document.getElementById('item-id').value = '';
                document.getElementById('form-title').innerText = 'Redigir Publicação';
            }
        }

        // Renderiza tudo na primeira vez que a página abre
        renderActivities();

    </script>
</body>
</html>
